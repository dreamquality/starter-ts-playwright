name: Playwright Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7
    - uses: actions/setup-node@v6
      with:
        node-version: '18.x'
    - name: Install dependencies
      run: npm ci
    - name: Install Playwright
      run: npx playwright install --with-deps
    - name: Run Playwright tests
      run: npx playwright test
      continue-on-error: true 
    - uses: actions/upload-artifact@v7
      if: always()
      with:
        name: playwright-test-results
        path: test-results/
    - name: Publish JUnit Report
      uses: mikepenz/action-junit-report@v6
      if: always() # always run even if the previous step fails
      with:
        report_paths: 'junit-results/*.xml'

    - name: Get Allure history
      uses: actions/checkout@v7
      if: always()
      continue-on-error: true
      with:
        ref: gh-pages
        path: gh-pages

    - name: Restore Allure history
      if: always()
      run: |
        if [ -d "gh-pages/history" ]; then
          mkdir -p allure-results/history
          cp -r gh-pages/history/. allure-results/history/
        fi

    - name: Generate Allure Report
      if: always()
      run: |
        if [ -d "allure-results" ] && [ -n "$(find allure-results -type f 2>/dev/null | head -1)" ]; then
          rm -rf allure-history
          npx allure generate allure-results --output allure-history --history-limit 20
        else
          mkdir -p allure-history
        fi

    - uses: actions/upload-artifact@v7
      if: always()
      with:
        name: allure-test-results
        path: allure-history/

    - name: Deploy report to Github Pages
      if: always()
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_branch: gh-pages
        publish_dir: allure-history
